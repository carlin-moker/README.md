<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HYDRA-CORE DASHBOARD v2.0</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        .terminal { border: 2px solid #00ff41; padding: 20px; box-shadow: 0 0 15px #00ff41; width: 100%; max-width: 500px; }
        h1 { font-size: 1.1rem; text-shadow: 0 0 10px #00ff41; text-align: center; }
        .btn-green { background: #00ff41; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-red { background: #ff0000; color: white; border: none; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        #status { margin-top: 20px; font-size: 0.85rem; border-top: 1px solid #00ff41; padding-top: 10px; min-height: 60px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>🌌 SISTEMA HYDRA-MORENA ACTIVADO</h1>
        <p style="text-align: center; font-size: 0.8rem;">ID: yefris19baseeth.base.eth</p>
        <hr style="border: 0.5px solid #00ff41;">
        
        <button class="btn-green" onclick="conectar()">VINCULAR PODER</button>
        <button class="btn-red" onclick="escanearOportunidad()">ACTIVAR ESCANEO SINIESTRO</button>

        <div id="status">>>>> ESPERANDO ÓRDENES DEL MEN...</div>
    </div>

    <script>
        async function conectar() {
            const status = document.getElementById('status');
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    status.innerHTML = ">>>> PODER VINCULADO: " + accounts[0].substring(0,15) + "...";
                } catch (err) {
                    status.innerHTML = ">>>> ERROR: CONEXIÓN CANCELADA.";
                }
            } else {
                status.innerHTML = ">>>> INSTALA UNA BILLETERA WEB3, MEN.";
            }
        }

        function escanearOportunidad() {
            const status = document.getElementById('status');
            status.innerHTML = ">>>> RASTREANDO RUTAS SINIESTRAS...";
            setTimeout(() => {
                const ganancia = (Math.random() * 0.08).toFixed(4);
                status.innerHTML = ">>>> ¡OPORTUNIDAD DETECTADA! 🚀<br>>>> DIFERENCIAL: +" + ganancia + " ETH";
            }, 2000);
        }
    </script>
</body>
</html>
